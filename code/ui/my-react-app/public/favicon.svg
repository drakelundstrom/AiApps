<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="loop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Infinity/DevOps loop -->
  <g transform="translate(32,30)" fill="none" stroke="url(#loop)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-3,0 C-3,-8 -14,-12 -18,-5 C-22,2 -14,10 -3,0 Z"/>
    <path d="M3,0 C3,-8 14,-12 18,-5 C22,2 14,10 3,0 Z"/>
  </g>
  <!-- AI sparkle dots -->
  <circle cx="16" cy="14" r="2.2" fill="#fbbf24" opacity="0.9"/>
  <circle cx="48" cy="14" r="1.8" fill="#34d399" opacity="0.9"/>
  <circle cx="32" cy="52" r="2" fill="#f472b6" opacity="0.85"/>
  <!-- Small gear on the left loop -->
  <g transform="translate(21,30)" fill="#fff" opacity="0.6">
    <circle cx="0" cy="0" r="3"/>
    <rect x="-0.8" y="-5.5" width="1.6" height="3" rx="0.6"/>
    <rect x="-0.8" y="2.5" width="1.6" height="3" rx="0.6"/>
    <rect x="-5.5" y="-0.8" width="3" height="1.6" rx="0.6"/>
    <rect x="2.5" y="-0.8" width="3" height="1.6" rx="0.6"/>
  </g>
  <!-- Small brain/circuit on the right loop -->
  <g transform="translate(43,30)" fill="none" stroke="#fff" stroke-width="1.3" opacity="0.6">
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.4"/>
    <line x1="0" y1="-3" x2="0" y2="-5.5"/>
    <line x1="0" y1="3" x2="0" y2="5.5"/>
    <line x1="-3" y1="0" x2="-5.5" y2="0"/>
    <line x1="3" y1="0" x2="5.5" y2="0"/>
    <circle cx="0" cy="-5.5" r="1" fill="#fff"/>
    <circle cx="0" cy="5.5" r="1" fill="#fff"/>
    <circle cx="-5.5" cy="0" r="1" fill="#fff"/>
    <circle cx="5.5" cy="0" r="1" fill="#fff"/>
  </g>
</svg>
