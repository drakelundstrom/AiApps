name: App Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'code/ui/**'
      - '.github/workflows/app-deploy.yml'
  workflow_run:
    workflows: ["Infra Deploy"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: app-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: VibingWithDrake
  NODE_VERSION: "24.x"

jobs:
  build-and-deploy:
    name: build and deploy static web app
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: use node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: code/ui/my-react-app/package-lock.json

      - name: install and build
        run: |
          cd code/ui/my-react-app
          npm ci
          npm run build

      - name: log in to Azure
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: deploy to Azure Static Web App
        env:
          SWA_CLI_APP_NAME: ${{ env.AZURE_WEBAPP_NAME }}
          SWA_CLI_RESOURCE_GROUP: FunAiApps
          SWA_CLI_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SWA_CLI_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          SWA_CLI_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npx @azure/static-web-apps-cli deploy code/ui/my-react-app/dist --env production
