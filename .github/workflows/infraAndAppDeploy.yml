name: Infra and App Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: VibingWithDrake
  AZURE_APPSERVICE_PLAN: front-end-app-service-plan
  NODE_VERSION: "24.x"

jobs:
  detect-changes:
    name: detect changed areas
    runs-on: ubuntu-latest
    outputs:
      run_infra: ${{ steps.compute.outputs.run_infra }}
      run_ui: ${{ steps.compute.outputs.run_ui }}
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
            ui:
              - 'code/ui/**'
            pipelines:
              - '.github/workflows/**'

      - name: compute pipeline gates
        id: compute
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_infra=true" >> "$GITHUB_OUTPUT"
            echo "run_ui=true" >> "$GITHUB_OUTPUT"
          else
            if [ "${{ steps.filter.outputs.infra }}" = "true" ] || [ "${{ steps.filter.outputs.pipelines }}" = "true" ]; then
              echo "run_infra=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_infra=false" >> "$GITHUB_OUTPUT"
            fi

            if [ "${{ steps.filter.outputs.ui }}" = "true" ] || [ "${{ steps.filter.outputs.infra }}" = "true" ] || [ "${{ steps.filter.outputs.pipelines }}" = "true" ]; then
              echo "run_ui=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_ui=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  infra-pipeline:
    name: infra pipeline
    needs: detect-changes
    if: needs.detect-changes.outputs.run_infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: log in to Azure
        run: |
          az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: deploy infrastructure
        run: |
          az deployment group create \
            --resource-group 'OSUDemo' \
            --parameters './infra/main.bicepparam' \
            --parameters webAppName=${{ env.AZURE_WEBAPP_NAME }} appServicePlanName=${{ env.AZURE_APPSERVICE_PLAN }}

  build-ui:
    name: build UI
    needs:
      - detect-changes
      - infra-pipeline
    if: |
      needs.detect-changes.outputs.run_ui == 'true' &&
      (needs.infra-pipeline.result == 'success' || needs.infra-pipeline.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: use node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm install and build
        run: |
          cd code/ui/my-react-app
          npm install
          npm run build

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: website
          path: code/ui/my-react-app/dist/

  deploy-ui:
    name: deploy UI
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - name: log in to Azure
        run: |
          az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: download artifact
        uses: actions/download-artifact@v7
        with:
          name: website
          path: website

      - name: zip files
        run: |
          cd website
          zip -r ../website.zip .

      - name: deploy to azure web app
        id: deploy-to-web-app
        run: |
          az webapp deployment source config-zip \
            --resource-group 'OSUDemo' \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --src ./website.zip
